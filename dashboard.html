<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证与贡献 | AI Knowledge Bank</title>
    <meta name="description" content="登录后提交真实使用结果，并查看信誉、徽章和通知。">
    <link rel="canonical" href="https://aiknowledgebank.pages.dev/dashboard.html" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="User Dashboard | AI Knowledge Bank" />
    <meta property="og:description" content="Manage your profile, badges, reputation, and contributions." />
    <meta property="og:url" content="https://aiknowledgebank.pages.dev/dashboard.html" />
    <link rel="icon" href="./assets/brand/akb-love-logo.svg" type="image/svg+xml" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">

    <!-- Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        deep: '#02040a',
                        surface: '#0f172a',
                        primary: '#10b981',
                        accent: '#f59e0b',
                    },
                }
            }
        }
    </script>

    <style>
        :root {
            --color-deep: #02040a;
            --color-surface: #0f172a;
            --color-primary: #10b981;
            --color-primary-glow: #34d399;
            --color-accent: #f59e0b;
            --color-accent-glow: #fbbf24;
            --color-blue: #3b82f6;
            --color-purple: #8b5cf6;
        }

        body {
            background-color: var(--color-deep);
            color: #f8fafc;
            font-feature-settings: "cv11", "ss01";
            font-smooth: always;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { 
            background: var(--color-deep); 
            border-left: 1px solid rgba(255,255,255,0.03);
        }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        ::-webkit-scrollbar-thumb:hover { 
            background: linear-gradient(180deg, #334155 0%, #1e293b 100%);
        }

        /* Glass Morphism Effects */
        .glass {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .glass-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.5) 0%, rgba(15, 23, 42, 0.7) 100%);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 
                0 8px 40px rgba(16, 185, 129, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* Gradient Text Effects */
        .text-gradient {
            background: linear-gradient(135deg, #34d399 0%, #3b82f6 50%, #8b5cf6 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 5s ease infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Enhanced Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px -5px rgba(16, 185, 129, 0.5);
        }
        
        .btn-primary:hover::before {
            left: 100%;
        }

        /* Glow Effects */
        .glow-primary {
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.3);
        }
        
        .glow-accent {
            box-shadow: 0 0 40px rgba(245, 158, 11, 0.3);
        }

        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, 
                rgba(255,255,255,0.03) 25%, 
                rgba(255,255,255,0.08) 50%, 
                rgba(255,255,255,0.03) 75%
            );
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Badge Hover Effects */
        .badge-item {
            position: relative;
            overflow: hidden;
        }
        
        .badge-item::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .badge-item:hover::before {
            opacity: 1;
        }

        /* Stat Card Animations */
        .stat-card {
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--color-primary), var(--color-blue));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover::after {
            transform: scaleX(1);
        }
    </style>
    <link rel="stylesheet" href="./assets/typography.css" />
</head>
<body class="antialiased min-h-screen">

    <!-- Navigation -->
    <nav class="fixed w-full z-50 top-0 start-0 border-b border-white/5 glass">
        <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between px-6 py-4">
            <a href="index.html" class="flex items-center gap-3 group">
                <img src="./assets/brand/akb-love-logo.svg" alt="AI Knowledge Bank logo" class="w-10 h-10 rounded-xl shadow-lg" />
                <span class="self-center text-xl font-semibold whitespace-nowrap text-white">AI Knowledge Bank</span>
            </a>
            <div class="flex items-center gap-4">
                <button id="language-toggle" class="dashboard-language-toggle" type="button" aria-label="切换语言" data-i18n-aria="dashboard.languageLabel">EN</button>
                <button id="logout-btn" class="hidden text-gray-300 hover:text-white transition-colors text-sm" data-i18n="dashboard.logout">
                    退出登录
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-24 pb-16 px-4 max-w-7xl mx-auto">
        
        <!-- Loading State -->
        <div id="loading-state" class="flex items-center justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary"></div>
            <span class="ml-4 text-gray-400" data-i18n="dashboard.loading">正在读取贡献记录...</span>
        </div>

        <!-- Auth Required State -->
        <div id="auth-required" class="hidden py-20 max-w-2xl mx-auto">
            <div class="text-6xl mb-6">🔐</div>
            <h2 class="dashboard-state-title text-white mb-4" data-i18n="dashboard.authRequired.title">登录后继续验证与贡献</h2>
            <p class="dashboard-state-copy text-gray-400 mb-8" data-i18n="dashboard.authRequired.copy">使用 GitHub 登录，提交使用结果并查看信誉、徽章和通知。</p>
            <div class="flex gap-4">
                <button onclick="handleOAuth('github')" class="btn-primary inline-flex items-center py-3 px-6 text-base font-medium text-white rounded-xl">
                    <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                    <span data-i18n="dashboard.authRequired.button">使用 GitHub 登录</span>
                </button>
            </div>
        </div>

        <!-- Auth Configuration Missing State -->
        <div id="auth-unavailable" class="hidden py-20 max-w-2xl mx-auto">
            <div class="text-6xl mb-6" aria-hidden="true">⚙️</div>
            <h2 class="dashboard-state-title text-white mb-4" data-i18n="dashboard.authUnavailable.title">此部署未启用用户登录</h2>
            <p class="dashboard-state-copy text-gray-400 mb-8" data-i18n="dashboard.authUnavailable.copy">
                当前部署缺少浏览器登录所需的公开 Supabase 配置。你仍可浏览三库和演示内容。
            </p>
            <a href="./index.html" class="btn-primary inline-flex items-center py-3 px-6 text-base font-medium text-white rounded-xl" data-i18n="dashboard.authUnavailable.link">
                返回公共知识库
            </a>
        </div>

        <!-- Dashboard Content -->
        <div id="dashboard-content" class="hidden space-y-8">
            
            <!-- Profile Header -->
            <div class="glass-card rounded-2xl p-8">
                <div class="flex flex-col gap-6 md:flex-row md:items-start md:justify-between">
                    <div class="flex flex-col gap-6 sm:flex-row sm:items-center">
                        <div id="user-avatar" class="w-24 h-24 rounded-full bg-gradient-to-br from-primary to-blue-600 flex items-center justify-center text-4xl font-bold text-white shadow-lg">
                            👤
                        </div>
                        <div>
                            <div class="text-xs font-medium text-primary mb-2" data-i18n="dashboard.overview">贡献者概览</div>
                            <h1 id="user-name" class="text-3xl text-white mb-2">正在读取...</h1>
                            <p id="user-email" class="text-gray-400 mb-3">-</p>
                            <div class="flex items-center gap-4">
                                <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-primary/20 text-primary">
                                    <span data-i18n="dashboard.reputation">信誉</span>: <span id="user-reputation" class="ml-1 font-bold">-</span>
                                </span>
                                <span class="text-sm text-gray-500"><span data-i18n="dashboard.memberSince">加入于</span> <span id="member-since">-</span></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="glass-card rounded-xl p-6 stat-card group cursor-default">
                    <div class="flex items-center justify-between mb-2">
                        <div class="text-sm text-gray-500 group-hover:text-gray-400 transition-colors" data-i18n="dashboard.stat.validations">验证</div>
                        <div class="text-green-500 opacity-70">✓</div>
                    </div>
                    <div id="stat-validations" class="text-3xl font-bold text-primary group-hover:scale-110 transition-transform origin-left">-</div>
                </div>
                <div class="glass-card rounded-xl p-6 stat-card group cursor-default">
                    <div class="flex items-center justify-between mb-2">
                        <div class="text-sm text-gray-500 group-hover:text-gray-400 transition-colors" data-i18n="dashboard.stat.forks">分叉</div>
                        <div class="text-blue-500 opacity-70">🍴</div>
                    </div>
                    <div id="stat-forks" class="text-3xl font-bold text-blue-400 group-hover:scale-110 transition-transform origin-left">-</div>
                </div>
                <div class="glass-card rounded-xl p-6 stat-card group cursor-default">
                    <div class="flex items-center justify-between mb-2">
                        <div class="text-sm text-gray-500 group-hover:text-gray-400 transition-colors" data-i18n="dashboard.stat.merges">合并</div>
                        <div class="text-yellow-500 opacity-70">✨</div>
                    </div>
                    <div id="stat-merges" class="text-3xl font-bold text-accent group-hover:scale-110 transition-transform origin-left">-</div>
                </div>
                <div class="glass-card rounded-xl p-6 stat-card group cursor-default">
                    <div class="flex items-center justify-between mb-2">
                        <div class="text-sm text-gray-500 group-hover:text-gray-400 transition-colors" data-i18n="dashboard.stat.badges">徽章</div>
                        <div class="text-purple-500 opacity-70">🏅</div>
                    </div>
                    <div id="stat-badges" class="text-3xl font-bold text-purple-400 group-hover:scale-110 transition-transform origin-left">-</div>
                </div>
            </div>

            <div class="grid lg:grid-cols-2 gap-8">
                
                <!-- Badges Section -->
                <div class="glass-card rounded-2xl p-6">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-xl text-white" data-i18n="dashboard.badges.title">获得的徽章</h2>
                    </div>
                    <div id="badges-grid" class="grid grid-cols-3 gap-4">
                        <!-- Badges will be loaded here -->
                    </div>
                </div>

                <!-- Recent Activity -->
                <div class="glass-card rounded-2xl p-6">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-xl text-white" data-i18n="dashboard.activity.title">最近贡献</h2>
                    </div>
                    <div id="activity-list" class="space-y-3 text-sm text-gray-500">
                        <p data-i18n="dashboard.activity.empty">还没有使用结果。先提交一次真实结果。</p>
                    </div>
                </div>

            </div>

            <!-- Notifications -->
            <div class="glass-card rounded-2xl p-6">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl text-white" data-i18n="dashboard.notifications.title">通知</h2>
                    <button id="mark-read-btn" class="text-xs text-primary hover:text-primary/80" data-i18n="dashboard.notifications.markRead">
                        全部标为已读
                    </button>
                </div>
                <div id="notifications-list" class="space-y-3">
                    <!-- Notifications will be loaded here -->
                </div>
            </div>

        </div>

    </main>

    <script type="module">
        import { loadSupabaseConfig, mergeSupabaseRuntimeEnv } from './lib/supabase-config.ts';
        import { applyTranslations, getCurrentLang, setLanguage, t } from './lib/shared/i18n.js';

        let supabaseConfig = null;
        const currentLanguage = getCurrentLang();
        let supabase = null;

        // DOM Elements
        const loadingState = document.getElementById('loading-state');
        const authRequired = document.getElementById('auth-required');
        const authUnavailable = document.getElementById('auth-unavailable');
        const dashboardContent = document.getElementById('dashboard-content');
        const logoutBtn = document.getElementById('logout-btn');
        const languageToggle = document.getElementById('language-toggle');
        const markReadBtn = document.getElementById('mark-read-btn');

        // Check authentication on load
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            
            if (!session) {
                showAuthRequired();
            } else {
                await loadDashboard(session.user);
            }
            
            loadingState.classList.add('hidden');
        }

        function showAuthRequired() {
            logoutBtn.classList.add('hidden');
            authRequired.classList.remove('hidden');
            authUnavailable.classList.add('hidden');
            dashboardContent.classList.add('hidden');
        }

        function showAuthUnavailable() {
            logoutBtn.classList.add('hidden');
            loadingState.classList.add('hidden');
            authRequired.classList.add('hidden');
            authUnavailable.classList.remove('hidden');
            dashboardContent.classList.add('hidden');
        }

        function showDashboard() {
            logoutBtn.classList.remove('hidden');
            authRequired.classList.add('hidden');
            authUnavailable.classList.add('hidden');
            dashboardContent.classList.remove('hidden');
        }

        async function loadDashboard(user) {
            showDashboard();

            document.getElementById('user-name').textContent = user.user_metadata?.user_name || t('dashboard.userFallback', currentLanguage);
            document.getElementById('user-email').textContent = user.email || '-';
            
            // Load user profile
            const { data: profile } = await supabase
                .from('user_profiles')
                .select('*')
                .eq('user_id', user.id)
                .single();

            if (profile) {
                // Update UI with profile data
                document.getElementById('user-name').textContent = profile.username || t('dashboard.userFallback', currentLanguage);
                document.getElementById('user-email').textContent = profile.email || user.email;
                document.getElementById('user-reputation').textContent = Number(profile.reputation_score || 0).toFixed(1);
                
                const memberSince = new Date(profile.created_at).toLocaleDateString(currentLanguage === 'zh' ? 'zh-CN' : 'en-US', {
                    year: 'numeric', 
                    month: 'long' 
                });
                document.getElementById('member-since').textContent = memberSince;

                // Update stats
                document.getElementById('stat-validations').textContent = profile.total_validations;
                document.getElementById('stat-forks').textContent = profile.total_forks;
                document.getElementById('stat-merges').textContent = profile.total_merges;
                document.getElementById('stat-badges').textContent = (profile.badges || []).length;

                // Set avatar - use safe DOM API to prevent XSS
                const avatarEl = document.getElementById('user-avatar');
                if (profile.avatar_url) {
                    avatarEl.textContent = '';
                    const img = document.createElement('img');
                    img.src = profile.avatar_url;
                    img.className = 'w-full h-full rounded-full object-cover';
                    img.alt = profile.username || t('dashboard.userFallback', currentLanguage);
                    avatarEl.appendChild(img);
                } else {
                    avatarEl.textContent = (profile.username || 'U')[0].toUpperCase();
                }
            }

            // Load badges
            loadBadges(user.id);
            
            // Load notifications
            loadNotifications(user.id);
        }

        async function loadBadges(userId) {
            const { data: userBadges } = await supabase
                .from('user_badges')
                .select(`
                    *,
                    badges (*)
                `)
                .eq('user_id', userId)
                .order('awarded_at', { ascending: false });

            const badgesGrid = document.getElementById('badges-grid');
            
            if (!userBadges || userBadges.length === 0) {
                badgesGrid.innerHTML = `
                    <div class="col-span-3 text-center py-8 text-gray-500">
                        <div class="text-4xl mb-2">🌱</div>
                        <p class="text-sm">${t('dashboard.badges.empty', currentLanguage)}</p>
                    </div>
                `;
                return;
            }

            badgesGrid.textContent = '';
            userBadges.forEach(ub => {
                const badgeDiv = document.createElement('div');
                badgeDiv.className = 'glass rounded-lg p-4 text-center hover:bg-white/5 transition-all';

                const iconDiv = document.createElement('div');
                iconDiv.className = 'text-3xl mb-2';
                iconDiv.textContent = ub.badges?.icon || '🏅';
                badgeDiv.appendChild(iconDiv);

                const nameDiv = document.createElement('div');
                nameDiv.className = 'text-xs font-medium text-white';
                nameDiv.textContent = ub.badges?.name || t('dashboard.badgeFallback', currentLanguage);
                badgeDiv.appendChild(nameDiv);

                const dateDiv = document.createElement('div');
                dateDiv.className = 'text-[10px] text-gray-500 mt-1';
                dateDiv.textContent = new Date(ub.awarded_at).toLocaleDateString(currentLanguage === 'zh' ? 'zh-CN' : 'en-US');
                badgeDiv.appendChild(dateDiv);

                badgesGrid.appendChild(badgeDiv);
            });
        }

        async function loadNotifications(userId) {
            const { data: notifications } = await supabase
                .from('notifications')
                .select('*')
                .eq('user_id', userId)
                .order('created_at', { ascending: false })
                .limit(10);

            const notificationsList = document.getElementById('notifications-list');
            
            if (!notifications || notifications.length === 0) {
                notificationsList.innerHTML = `
                    <div class="text-center py-8 text-gray-500">
                        <div class="text-4xl mb-2">📭</div>
                        <p class="text-sm">${t('dashboard.notifications.empty', currentLanguage)}</p>
                    </div>
                `;
                return;
            }

            notificationsList.textContent = '';
            notifications.forEach(notif => {
                const notifDiv = document.createElement('div');
                notifDiv.className = `flex items-start gap-3 p-3 rounded-lg ${!notif.is_read ? 'bg-primary/10 border border-primary/20' : 'hover:bg-white/5'} transition-all`;

                const iconDiv = document.createElement('div');
                iconDiv.className = 'text-xl';
                iconDiv.textContent = notif.type === 'badge' ? '🏆' : notif.type === 'merge' ? '✨' : '📢';
                notifDiv.appendChild(iconDiv);

                const contentDiv = document.createElement('div');
                contentDiv.className = 'flex-1 min-w-0';

                const titleDiv = document.createElement('div');
                titleDiv.className = 'text-sm font-medium text-white';
                titleDiv.textContent = notif.title;
                contentDiv.appendChild(titleDiv);

                const messageDiv = document.createElement('div');
                messageDiv.className = 'text-xs text-gray-400 mt-1';
                messageDiv.textContent = notif.message;
                contentDiv.appendChild(messageDiv);

                const dateDiv = document.createElement('div');
                dateDiv.className = 'text-[10px] text-gray-600 mt-2';
                dateDiv.textContent = new Date(notif.created_at).toLocaleString(currentLanguage === 'zh' ? 'zh-CN' : 'en-US');
                contentDiv.appendChild(dateDiv);

                notifDiv.appendChild(contentDiv);

                if (!notif.is_read) {
                    const dotDiv = document.createElement('div');
                    dotDiv.className = 'w-2 h-2 rounded-full bg-primary';
                    notifDiv.appendChild(dotDiv);
                }

                notificationsList.appendChild(notifDiv);
            });
        }

        // Event Listeners
        logoutBtn.addEventListener('click', async () => {
            if (!supabase) return;
            await supabase.auth.signOut();
            window.location.reload();
        });

        languageToggle.addEventListener('click', () => {
            setLanguage(currentLanguage === 'zh' ? 'en' : 'zh');
            window.location.reload();
        });

        markReadBtn.addEventListener('click', async () => {
            if (!supabase) return;
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) return;

            await supabase
                .from('notifications')
                .update({ is_read: true })
                .eq('user_id', session.user.id)
                .eq('is_read', false);

            loadNotifications(session.user.id);
        });

        // OAuth handler (global scope)
        window.handleOAuth = async (provider) => {
            if (!supabase) {
                showAuthUnavailable();
                return;
            }
            await supabase.auth.signInWithOAuth({
                provider,
                options: {
                    redirectTo: `${window.location.origin}/dashboard.html`,
                },
            });
        };

        async function initializeDashboard() {
            supabaseConfig = await loadSupabaseConfig(window.__ENV || {}, import.meta.env);
            if (!supabaseConfig) {
                showAuthUnavailable();
                return;
            }

            window.__ENV = mergeSupabaseRuntimeEnv(window.__ENV || {}, supabaseConfig);

            try {
                const { getSupabaseClient } = await import('./lib/auth.ts');
                supabase = getSupabaseClient();
                await checkAuth();
            } catch (error) {
                console.error('Dashboard authentication initialization failed.', error);
                showAuthUnavailable();
            }
        }

        applyTranslations(currentLanguage);
        languageToggle.textContent = currentLanguage === 'zh' ? 'EN' : '中';
        languageToggle.setAttribute('aria-label', t('dashboard.languageLabel', currentLanguage));
        document.title = t('dashboard.pageTitle', currentLanguage);
        document.querySelector('meta[name="description"]')?.setAttribute('content', t('dashboard.description', currentLanguage));
        initializeDashboard();
    </script>
</body>
</html>
