<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Knowledge Bank love mark</title>
  <desc id="desc">A logo mark combining AI, the Chinese homophone love, knowledge nodes, and a stable bank-like seal.</desc>
  <defs>
    <linearGradient id="seal" x1="16" y1="12" x2="116" y2="118" gradientUnits="userSpaceOnUse">
      <stop stop-color="#11A994"/>
      <stop offset="0.46" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#D96A43"/>
    </linearGradient>
    <linearGradient id="shine" x1="28" y1="18" x2="99" y2="115" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.42"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.22"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="128" height="128" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.22"/>
    </filter>
  </defs>
